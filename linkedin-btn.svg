<svg xmlns="http://www.w3.org/2000/svg" width="110" height="34">
  <style>
    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: 600;
      fill: #888888;
    }
    
    @keyframes f0Anim { 0%, 2.49% { opacity: 1; } 2.5%, 100% { opacity: 0; } }
    @keyframes f1Anim { 0%, 2.49% { opacity: 0; } 2.5%, 4.99% { opacity: 1; } 5.0%, 100% { opacity: 0; } }
    @keyframes f2Anim { 0%, 4.99% { opacity: 0; } 5.0%, 7.49% { opacity: 1; } 7.5%, 100% { opacity: 0; } }
    @keyframes f3Anim { 0%, 7.49% { opacity: 0; } 7.5%, 9.99% { opacity: 1; } 10.0%, 100% { opacity: 0; } }
    @keyframes f4Anim { 0%, 9.99% { opacity: 0; } 10.0%, 12.49% { opacity: 1; } 12.5%, 100% { opacity: 0; } }
    @keyframes f5Anim { 0%, 12.49% { opacity: 0; } 12.5%, 14.99% { opacity: 1; } 15.0%, 100% { opacity: 0; } }
    @keyframes f6Anim { 0%, 14.99% { opacity: 0; } 15.0%, 17.49% { opacity: 1; } 17.5%, 100% { opacity: 0; } }
    @keyframes f7Anim { 0%, 17.49% { opacity: 0; } 17.5%, 19.99% { opacity: 1; } 20.0%, 100% { opacity: 0; } }
    @keyframes defAnim { 0%, 19.99% { opacity: 0; } 20.0%, 100% { opacity: 1; } }

    .f0 { animation: f0Anim 4s infinite; opacity: 0; }
    .f1 { animation: f1Anim 4s infinite; opacity: 0; }
    .f2 { animation: f2Anim 4s infinite; opacity: 0; }
    .f3 { animation: f3Anim 4s infinite; opacity: 0; }
    .f4 { animation: f4Anim 4s infinite; opacity: 0; }
    .f5 { animation: f5Anim 4s infinite; opacity: 0; }
    .f6 { animation: f6Anim 4s infinite; opacity: 0; }
    .f7 { animation: f7Anim 4s infinite; opacity: 0; }
    .default { animation: defAnim 4s infinite; opacity: 1; }
    
    .sweep {
      animation: sweepAnim 4s linear infinite;
    }
    @keyframes sweepAnim {
      0% { transform: translateY(0); opacity: 1; }
      20% { transform: translateY(-68px); opacity: 1; }
      20.1%, 100% { opacity: 0; }
    }
  </style>

  <g class="btn">
    <clipPath id="btn-clip">
      <rect x="1" y="1" width="108" height="32" rx="4" />
    </clipPath>

    <rect x="1" y="1" width="108" height="32" rx="4" fill="transparent" stroke="#888888" stroke-width="1"/>
    
    <linearGradient id="sweepGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#888888" stop-opacity="0" />
      <stop offset="50%" stop-color="#888888" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#888888" stop-opacity="0" />
    </linearGradient>
    <rect x="1" y="34" width="108" height="32" fill="url(#sweepGrad)" clip-path="url(#btn-clip)" class="sweep" />

    <g transform="translate(55, 22)" text-anchor="middle">
      <text class="f0">!@#$%^&amp;*</text>
      <text class="f1">L@#$%^&amp;*</text>
      <text class="f2">Li;?%^&amp;*</text>
      <text class="f3">Lin$|#&amp;*</text>
      <text class="f4">Link@?&amp;!</text>
      <text class="f5">Linke&gt;&lt;|</text>
      <text class="f6">Linked:#</text>
      <text class="f7">LinkedI!</text>
      <text class="default">LinkedIn</text>
    </g>
  </g>
</svg>
