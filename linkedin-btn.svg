<svg xmlns="http://www.w3.org/2000/svg" width="110" height="34">
  <style>
    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: 600;
      fill: #888888;
      cursor: pointer;
    }
    
    .frame { opacity: 0; }
    .default { opacity: 1; }
    
    /* On hover, hide default immediately */
    .btn:hover .default { opacity: 0; }
    
    /* Play each frame sequentially instantly on hover */
    .btn:hover .f0 { animation: flash 0.05s 0.00s forwards; }
    .btn:hover .f1 { animation: flash 0.05s 0.05s forwards; }
    .btn:hover .f2 { animation: flash 0.05s 0.10s forwards; }
    .btn:hover .f3 { animation: flash 0.05s 0.15s forwards; }
    .btn:hover .f4 { animation: flash 0.05s 0.20s forwards; }
    .btn:hover .f5 { animation: flash 0.05s 0.25s forwards; }
    .btn:hover .f6 { animation: flash 0.05s 0.30s forwards; }
    .btn:hover .f7 { animation: flash 0.05s 0.35s forwards; }
    
    /* Show the final resolved text permanently after the scramble */
    .btn:hover .f8 { animation: stay 1s 0.40s forwards; }
    
    @keyframes flash {
      0%, 99% { opacity: 1; }
      100% { opacity: 0; }
    }
    
    @keyframes stay {
      0%, 100% { opacity: 1; }
    }
    
    .sweep { opacity: 0; }
    
    /* Instantly trigger gradient sweep */
    .btn:hover .sweep {
      opacity: 1;
      animation: sweepAnim 1.5s linear infinite alternate;
    }
    
    @keyframes sweepAnim {
      0% { transform: translateY(0); }
      100% { transform: translateY(-68px); }
    }
  </style>

  <g class="btn" pointer-events="all">
    <clipPath id="btn-clip">
      <rect x="1" y="1" width="108" height="32" rx="4" />
    </clipPath>

    <rect x="1" y="1" width="108" height="32" rx="4" fill="transparent" stroke="#888888" stroke-width="1"/>
    
    <linearGradient id="sweepGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#888888" stop-opacity="0" />
      <stop offset="50%" stop-color="#888888" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#888888" stop-opacity="0" />
    </linearGradient>
    <rect x="1" y="34" width="108" height="32" fill="url(#sweepGrad)" clip-path="url(#btn-clip)" class="sweep" />

    <g transform="translate(55, 22)" text-anchor="middle">
      <text class="default">LinkedIn</text>
      <text class="frame f0">!@#$%^&amp;*</text>
      <text class="frame f1">L@#$%^&amp;*</text>
      <text class="frame f2">Li;?%^&amp;*</text>
      <text class="frame f3">Lin$|#&amp;*</text>
      <text class="frame f4">Link@?&amp;!</text>
      <text class="frame f5">Linke&gt;&lt;|</text>
      <text class="frame f6">Linked:#</text>
      <text class="frame f7">LinkedI!</text>
      <text class="frame f8">LinkedIn</text>
    </g>
  </g>
</svg>
