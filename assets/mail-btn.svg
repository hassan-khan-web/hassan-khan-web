<svg xmlns="http://www.w3.org/2000/svg" width="110" height="34">
  <style>
    .btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: 600;
      fill: #888888;
    }
    
    @keyframes f0Anim { 0%, 1.99% { opacity: 1; } 2%, 100% { opacity: 0; } }
    @keyframes f1Anim { 0%, 1.99% { opacity: 0; } 2.0%, 3.99% { opacity: 1; } 4.0%, 100% { opacity: 0; } }
    @keyframes f2Anim { 0%, 3.99% { opacity: 0; } 4.0%, 5.99% { opacity: 1; } 6.0%, 100% { opacity: 0; } }
    @keyframes f3Anim { 0%, 5.99% { opacity: 0; } 6.0%, 7.99% { opacity: 1; } 8.0%, 100% { opacity: 0; } }
    @keyframes f4Anim { 0%, 7.99% { opacity: 0; } 8.0%, 9.99% { opacity: 1; } 10.0%, 100% { opacity: 0; } }
    @keyframes f5Anim { 0%, 9.99% { opacity: 0; } 10.0%, 11.99% { opacity: 1; } 12.0%, 100% { opacity: 0; } }
    @keyframes f6Anim { 0%, 11.99% { opacity: 0; } 12.0%, 13.99% { opacity: 1; } 14.0%, 100% { opacity: 0; } }
    @keyframes f7Anim { 0%, 13.99% { opacity: 0; } 14.0%, 15.99% { opacity: 1; } 16.0%, 100% { opacity: 0; } }
    @keyframes defAnim { 0%, 15.99% { opacity: 0; } 16.0%, 100% { opacity: 1; } }

    /* Runs a scramble every 4 seconds */
    .f0 { animation: f0Anim 4s infinite; opacity: 0; }
    .f1 { animation: f1Anim 4s infinite; opacity: 0; }
    .f2 { animation: f2Anim 4s infinite; opacity: 0; }
    .f3 { animation: f3Anim 4s infinite; opacity: 0; }
    .f4 { animation: f4Anim 4s infinite; opacity: 0; }
    .f5 { animation: f5Anim 4s infinite; opacity: 0; }
    .f6 { animation: f6Anim 4s infinite; opacity: 0; }
    .f7 { animation: f7Anim 4s infinite; opacity: 0; }
    .default { animation: defAnim 4s infinite; opacity: 1; }
    
    /* Scanner sweeps back and forth continuously forever */
    .sweep {
      animation: sweepAnim 1s linear infinite alternate;
      opacity: 1;
    }
    
    @keyframes sweepAnim {
      0% { transform: translateY(32px); }
      100% { transform: translateY(-32px); }
    }
  </style>

  <g class="btn">
    <clipPath id="btn-clip">
      <rect x="1" y="1" width="108" height="32" rx="4" />
    </clipPath>

    <!-- Background and Border -->
    <rect x="1" y="1" width="108" height="32" rx="4" fill="transparent" stroke="#888888" stroke-width="1"/>
    
    <!-- Sweeping Scanner -->
    <linearGradient id="sweepGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#888888" stop-opacity="0" />
      <stop offset="40%" stop-color="#888888" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#888888" stop-opacity="0.6" />
      <stop offset="60%" stop-color="#888888" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#888888" stop-opacity="0" />
    </linearGradient>
    <rect x="1" y="1" width="108" height="32" fill="url(#sweepGrad)" clip-path="url(#btn-clip)" class="sweep" pointer-events="none" />

    <!-- Text -->
    <g transform="translate(55, 22)" text-anchor="middle">
      <text class="f0">!@#?*</text>
      <text class="f1">E@#?*</text>
      <text class="f2">E#;?*</text>
      <text class="f3">Em$|*</text>
      <text class="f4">Ema@!</text>
      <text class="f5">Emai|</text>
      <text class="f6">Email</text>
      <text class="f7">Email</text>
      <text class="default">Email</text>
    </g>
  </g>
</svg>
